services:
  postgres:
    container_name: postgres_container
    image: postgres:16-alpine3.20
    environment:
      POSTGRES_DB: "tour-service"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tour-service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-net

  backend-app:
    build:
      context: ./          # ← КОРЕНЬ ПРОЕКТА
      dockerfile: dev-tools/Dockerfile
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tour-service
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend-app
    networks:
      - app-net

volumes:
  pg-data:

networks:
  app-net:
    driver: bridge